<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGH – Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="index.css">
  <style>

    /* ── Variáveis de cor do sistema ── */
    :root {
      --azul:    #1a4fa0;
      --laranja: #e8472a;
      --fundo:   #f0f2f5;
      --borda:   #cdd2db;
      --texto:   #1c1c2e;
      --sec:     #5a6278;
      --verde:   #1a7a3a;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Fundo escuro com gradiente sutil ── */
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1b36;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, #1a3a6e44, transparent 60%),
        radial-gradient(ellipse at 20% 80%, #0a4a6e33, transparent 50%);
      z-index: 0;
    }

    /* ── Card branco central ── */
    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      width: 100%;
      max-width: 380px;
      border-radius: 6px;
      padding: 40px 36px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    /* ── Logo SGH ── */
    .logo { text-align: center; margin-bottom: 28px; }

    .logo-letras {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 8px;
      line-height: 1;
    }
    .logo-letras .s, .logo-letras .h { color: var(--laranja); }
    .logo-letras .g                   { color: var(--azul); }

    .logo-nome {
      font-size: 12px;
      font-weight: 600;
      color: var(--azul);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .logo-empresa { font-size: 12px; color: var(--sec); margin-top: 2px; }

    /* ── Campos do formulário ── */
    .campo { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--sec);
      margin-bottom: 5px;
    }

    /* Campo senha tem posição relativa para o botão "ver" */
    .campo-senha { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 13px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      background: var(--fundo);
      border: 1.5px solid var(--borda);
      border-radius: 4px;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus        { outline: none; border-color: var(--azul); background: #fff; }
    input.invalido     { border-color: var(--laranja); } /* destaca campo com erro */

    /* Botão "ver / ocultar" dentro do campo de senha */
    .btn-ver {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sec);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 4px 6px;
    }
    .btn-ver:hover { color: var(--azul); }

    /* ── Mensagem de erro ou sucesso ── */
    .mensagem {
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      display: none; /* exibido via JS */
    }
    .mensagem.erro    { background: #fde8e8; border: 1px solid #f5b8b8; color: #a01a1a; }
    .mensagem.sucesso { background: #e8f5ec; border: 1px solid #a8d5b5; color: var(--verde); }

    /* ── Botão de login ── */
    .btn-entrar {
      width: 100%;
      padding: 13px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-entrar:hover    { background: #112f6a; }
    .btn-entrar:disabled { background: #9aabb8; cursor: not-allowed; }

    /* Spinner que aparece durante o carregamento */
    .loader {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: girar 0.6s linear infinite;
      display: none;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    /* ── Badge que mostra o perfil detectado após login ── */
    .perfil-detectado {
      display: none; /* exibido via JS após autenticação */
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      border-left: 3px solid;
    }
    /* Cor diferente para cada cargo */
    .perfil-detectado.operador      { background: #e8f5ec; border-color: var(--verde);  color: #0f4d25; }
    .perfil-detectado.supervisor    { background: #eef0fd; border-color: #4a5cc7;        color: #2a3580; }
    .perfil-detectado.administrador { background: #fff3e8; border-color: var(--laranja); color: #7a2010; }

    .pd-icone {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      background: rgba(0,0,0,0.08);
      flex-shrink: 0;
    }
    .pd-cargo { font-weight: 700; font-size: 13px; }
    .pd-nome  { font-size: 12px; opacity: 0.75; margin-top: 1px; }

    .rodape { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; }

  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-letras">
      <span class="s">S</span><span class="g">G</span><span class="h">H</span>
    </div>
    <p class="logo-nome">Sistema de Gestão Hídrica</p>
    <p class="logo-empresa">Color &amp; Têxtil</p>
  </div>

  <!-- Área de mensagens (erro ou sucesso) -->
  <div id="msg" class="mensagem"></div>

  <!-- Campo e-mail -->
  <div class="campo">
    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="seu@colortextil.com"
           autofocus autocomplete="email" />
  </div>

  <!-- Campo senha com botão ver/ocultar -->
  <div class="campo">
    <label for="senha">Senha</label>
    <div class="campo-senha">
      <input type="password" id="senha" placeholder="Sua senha"
             autocomplete="current-password" />
      <button class="btn-ver" type="button" id="btn-ver" tabindex="-1">ver</button>
    </div>
  </div>

  <!-- Botão de login com loader interno -->
  <button class="btn-entrar" id="btn" onclick="fazerLogin()">
    <div class="loader" id="loader"></div>
    <span id="btn-texto">Entrar</span>
  </button>

  <!-- Badge exibido após login bem-sucedido -->
  <div class="perfil-detectado" id="perfil-detectado">
    <div class="pd-icone" id="pd-icone"></div>
    <div>
      <div class="pd-cargo" id="pd-cargo"></div>
      <div class="pd-nome"  id="pd-nome"></div>
    </div>
  </div>

  <p class="rodape">SGH v1.0 &mdash; Color &amp; Têxtil &copy; 2025</p>

</div>

<script>

  // ── Configuração do Supabase ──────────────────────────────
  const SUPA_URL = 'https://huvohrqgcrgbdqwhgrro.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dm9ocnFnY3JnYmRxd2hncnJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTQ0NDEsImV4cCI6MjA4ODg5MDQ0MX0.1mNShzvzSPfljGKGVwMvDmY6_aiDxeaaHXVZ5K9i6oM';
  const { createClient } = supabase;
  const db = createClient(SUPA_URL, SUPA_KEY);

  // ── Redirecionamento por cargo ────────────────────────────
  const PAGINAS = {
    operador:      'operador.html',
    supervisor:    'supervisor.html',
    administrador: 'admin.html'
  };

  const LABELS = {
    operador:      'Operador',
    supervisor:    'Supervisor',
    administrador: 'Administrador'
  };

  // ── Botão ver/ocultar senha ───────────────────────────────
  document.getElementById('btn-ver').addEventListener('click', function() {
    var inp = document.getElementById('senha');
    if (inp.type === 'password') {
      inp.type = 'text';
      this.textContent = 'ocultar';
    } else {
      inp.type = 'password';
      this.textContent = 'ver';
    }
  });

  // ── Enter no e-mail avança para senha ─────────────────────
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('senha').focus();
  });

  // ── Enter na senha dispara o login ───────────────────────
  document.getElementById('senha').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') fazerLogin();
  });

  // ── Limpa mensagem ao digitar ─────────────────────────────
  document.getElementById('email').addEventListener('input', limparMsg);
  document.getElementById('senha').addEventListener('input', limparMsg);

  // Exibe uma mensagem de erro ou sucesso
  function mostrarMsg(texto, tipo) {
    var el = document.getElementById('msg');
    el.textContent = texto;
    el.className   = 'mensagem ' + tipo;
    el.style.display = 'block';
  }

  // Remove mensagem e marcações de campo inválido
  function limparMsg() {
    document.getElementById('msg').style.display = 'none';
    document.getElementById('email').classList.remove('invalido');
    document.getElementById('senha').classList.remove('invalido');
  }

  // Liga ou desliga o estado de carregamento no botão
  function setCarregando(sim) {
    document.getElementById('btn').disabled          = sim;
    document.getElementById('loader').style.display  = sim ? 'block' : 'none';
    document.getElementById('btn-texto').textContent = sim ? 'Verificando...' : 'Entrar';
  }

  // Exibe o badge com o cargo detectado
  function mostrarPerfil(cargo, nome) {
    var el = document.getElementById('perfil-detectado');
    document.getElementById('pd-icone').textContent = (LABELS[cargo] || cargo).charAt(0);
    document.getElementById('pd-cargo').textContent = LABELS[cargo] || cargo;
    document.getElementById('pd-nome').textContent  = nome;
    el.className     = 'perfil-detectado ' + cargo;
    el.style.display = 'flex';
  }

  // ── Função principal de login ─────────────────────────────
  async function fazerLogin() {
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;

    limparMsg();

    // Validação básica antes de chamar o servidor
    if (!email) {
      mostrarMsg('Informe o e-mail.', 'erro');
      document.getElementById('email').classList.add('invalido');
      document.getElementById('email').focus();
      return;
    }
    if (!senha) {
      mostrarMsg('Informe a senha.', 'erro');
      document.getElementById('senha').classList.add('invalido');
      document.getElementById('senha').focus();
      return;
    }

    setCarregando(true);

    try {

      // 1. Autenticar no Supabase com e-mail e senha
      var auth = await db.auth.signInWithPassword({ email: email, password: senha });

      if (auth.error) {
        mostrarMsg('E-mail ou senha incorretos. Tente novamente.', 'erro');
        document.getElementById('senha').value = '';
        document.getElementById('senha').classList.add('invalido');
        document.getElementById('senha').focus();
        return;
      }

      // 2. Buscar o perfil do usuário na tabela "perfil"
      var resultado = await db
        .from('perfil')
        .select('id, nome, cargo')
        .eq('id', auth.data.user.id)
        .single();

      var perfil = resultado.data;

      // 3. Se o perfil não existir ainda, criar com cargo padrão "operador"
      if (!perfil) {
        var nomeInicial = email.split('@')[0];
        await db.from('perfil').insert({
          id:    auth.data.user.id,
          nome:  nomeInicial,
          email: email,
          cargo: 'operador'
        });
        perfil = { cargo: 'operador', nome: nomeInicial };
      }

      var cargo = (perfil.cargo || 'operador').toLowerCase();
      var nome  = perfil.nome || email.split('@')[0];

      // 4. Salvar dados da sessão no localStorage para uso nas outras telas
      localStorage.setItem('sgh_cargo', cargo);
      localStorage.setItem('sgh_nome',  nome);
      localStorage.setItem('sgh_email', email);
      localStorage.setItem('sgh_uid',   auth.data.user.id);

      // 5. Mostrar badge e mensagem de sucesso
      mostrarPerfil(cargo, nome);
      mostrarMsg('Acesso autorizado. Redirecionando...', 'sucesso');

      // 6. Redirecionar para a tela correta após 1 segundo
      setTimeout(function() {
        window.location.href = PAGINAS[cargo] || 'principal.html';
      }, 1000);

    } catch (err) {
      mostrarMsg('Erro de conexao. Verifique sua internet.', 'erro');
      console.error(err);
    } finally {
      setCarregando(false);
    }
  }

  // ── Se já estiver logado, redireciona direto ──────────────
  (async function() {
    var sessao = await db.auth.getSession();
    if (sessao.data.session) {
      var cargo = localStorage.getItem('sgh_cargo') || 'operador';
      window.location.href = PAGINAS[cargo] || 'principal.html';
    }
  })();

</script>

</body>
</html>
